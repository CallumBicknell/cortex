name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Native targets only (cross aarch64-linux needs extra qemu setup).
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: cortex
            asset_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: cortex
            asset_ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            bin: cortex
            asset_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: cortex.exe
            asset_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release -p cortex-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          STAGE="cortex-${TAG}-${{ matrix.target }}"
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          mkdir -p "dist/${STAGE}"
          cp "${BIN}" "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/" || true
          tar -C dist -czf "dist/${STAGE}.tar.gz" "${STAGE}"
          echo "ASSET=dist/${STAGE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          STAGE="cortex-${TAG}-${{ matrix.target }}"
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          mkdir -p "dist/${STAGE}"
          cp "${BIN}" "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/" || true
          (cd dist && 7z a "${STAGE}.zip" "${STAGE}")
          echo "ASSET=dist/${STAGE}.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cortex-${{ matrix.target }}
          path: ${{ env.ASSET }}

  publish:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List assets
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
