# Auto-merge Dependabot patch/minor PRs after CI is green.
# Majors stay human-reviewed (they often need code fixes).
name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge (patch/minor)
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for non-major updates
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
          echo "Enabled auto-merge (squash) for ${{ steps.meta.outputs.update-type }}."

      - name: Comment when major needs human review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_URL" --body "$(cat <<'EOF'
          **Major dependency update** — auto-merge is skipped.

          Please review for breaking API changes (see prior examples: axum path params,
          tokio-tungstenite `Utf8Bytes`, sqlx 0.8, ratatui 0.30). Merge only after
          local `cargo clippy` / `cargo test --workspace` are green.
          EOF
          )"
