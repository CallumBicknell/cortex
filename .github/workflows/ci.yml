name: CI

on:
  push:
    branches: [main, master, "feat/**", "fix/**", "docs/**", "chore/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"

jobs:
  # --------------------------------------------------------------------------
  # Fast feedback: formatting + lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lint"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # --------------------------------------------------------------------------
  # Unit + integration tests
  # --------------------------------------------------------------------------
  test:
    name: Test (Rust)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test"

      - name: cargo test
        run: cargo test --workspace --all-targets

  # --------------------------------------------------------------------------
  # Agent eval fixtures (offline mock)
  # --------------------------------------------------------------------------
  eval:
    name: Eval suite
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test"

      - name: Build CLI
        run: cargo build -p cortex-cli --quiet

      - name: Run evals
        run: cargo run -q -p cortex-cli -- eval run --dir evals

  # --------------------------------------------------------------------------
  # Smoke: mock agent one-shot
  # --------------------------------------------------------------------------
  smoke:
    name: Smoke agent
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test"

      - name: Smoke
        run: ./scripts/smoke_agent.sh

  # --------------------------------------------------------------------------
  # Supply chain / licenses
  # --------------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "deny"

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # --------------------------------------------------------------------------
  # Python SDK
  # --------------------------------------------------------------------------
  python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml

      - name: Install SDK + test deps
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        working-directory: sdks/python
        run: pytest -q

  # --------------------------------------------------------------------------
  # Release-mode build (catch optim-only issues)
  # --------------------------------------------------------------------------
  build-release:
    name: Release build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"

      - name: cargo build --release
        run: cargo build --release -p cortex-cli

      - name: Upload cortex binary
        uses: actions/upload-artifact@v4
        with:
          name: cortex-linux-x86_64
          path: target/release/cortex
          if-no-files-found: error
