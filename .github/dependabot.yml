# Dependabot — weekly dependency PRs (grouped to avoid PR floods)
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    groups:
      tokio-ecosystem:
        patterns:
          - "tokio*"
          - "hyper*"
          - "tower*"
      ratatui-ecosystem:
        patterns:
          - "ratatui*"
          - "crossterm*"
      # Patch/minor of everything else in one PR when possible
      cargo-patch-minor:
        update-types:
          - "minor"
          - "patch"
        # Exclude groups that already have dedicated PRs
        exclude-patterns:
          - "tokio*"
          - "hyper*"
          - "tower*"
          - "ratatui*"
          - "crossterm*"

  - package-ecosystem: "pip"
    directory: "/sdks/python"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      python-sdk:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]
