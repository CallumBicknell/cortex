# Plugins: builtins + external directory plugins.
# See docs/plugin-system.md

enabled = true
# Auto-discover `.cortex/plugins/*` and `plugins/*` (each with plugin.toml)
auto_discover = true
# Extra roots:
# plugin_dirs = ["vendor/plugins"]

# Builtin demo plugin — contributes `plugin_echo`
[[plugins]]
id = "echo"
enabled = true

# External example:
# [[plugins]]
# id = "my_ext"
# path = "plugins/my_ext"
